name: CI Docker Build Validation

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - '**/requirements.txt'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - '**/requirements.txt'

jobs:
  docker-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Test Multi-Stage Docker Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: oxta-pathology:test-build
          cache-from: type=gha
          cache-to: type=gha,mode=max
